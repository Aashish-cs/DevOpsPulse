services:
  - type: web
    name: devopspulse-api
    runtime: node
    plan: free
    buildCommand: npm install --include=dev && npm run prisma:generate && npm run build -w backend
    startCommand: npm run start -w backend
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: CRON_SECRET
        sync: false
      - key: FRONTEND_URL
        sync: false
