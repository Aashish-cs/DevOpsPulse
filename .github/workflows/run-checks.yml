name: Run DevOpsPulse Checks

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  run-checks:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger uptime checks
        run: |
          curl --fail --show-error --silent \
            -X POST "${{ secrets.DEVOPSPULSE_API_URL }}/internal/run-checks" \
            -H "X-Cron-Secret: ${{ secrets.DEVOPSPULSE_CRON_SECRET }}"
